[SqlCommands]
get_tovs_menu_cnt=select count(*) as cnt_tov from spr_tov t where coalesce(NOT_USE,0)=0
get_tovs_menu=select t.kod,grp,(select price from PRC_GET_OUT_PRICE_EX('today',t.kod,'0000','0')) as PRICE_OUT,t.PRICE_OUT_USD,(select first 1 b.barcod from MN_BARCODE b where b.tov = t.kod and char_length(trim(b.barcod)) in (13, 8) order by case when char_length(trim(b.barcod)) = 13 then 0 else 1 end, b.kod) as BARCODE,PRICE_IN_USD,prim,t.ed,name from spr_tov t where coalesce(NOT_USE,0)=0 order by t.kod,grp,ua_name
get_grp=select kod,name from spr_group where WHOLE=0
ins_new_zakaz=EXECUTE PROCEDURE ALT_INS_ZAKAZ(:SITE_NUM,:PRIM,:TYPE_OPL,'',:FIO,:SALE_PRC,'',:EXECUTION_DATE,:PHONE,:ADDRPRIM,:DOP_INFO,:SHIP_TYPE,:EMAIL)
add_tov_zakaz=insert into MN_RC_TOV_RESERV (doc,tov,cnt,dop_cnt,price,dop_price,summa,ORIGIN_PRICE) values (:KOD_ZAKAZ,:tov,:cnt,:cnt,:price,:price,:summa,(select price from PRC_GET_OUT_PRICE_EX('today',:tov,'0000','0')))
upd_ins_grp_tov=UPDATE OR INSERT INTO spr_group (kod,name,parentid) values(:kod,:name,:parentid ) matching (kod)
upd_ins_tov_prices=UPDATE OR INSERT INTO spr_tov (kod,name,ed,PRICE_OUT,GRP) values(:kod,:name,'шт',:price,:grp ) matching (kod)
